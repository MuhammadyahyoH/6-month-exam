{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Molla - Bootstrap eCommerce Template</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/plugins/owl-carousel/owl.carousel.css' %}">
    <link rel="stylesheet" href="{% static 'css/plugins/jquery.countdown.css' %}">
    <link rel="stylesheet" href="{% static 'css/plugins/magnific-popup/magnific-popup.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/skins/skin-demo-24.css' %}">
    <link rel="stylesheet" href="{% static 'css/demos/demo-24.css' %}">
</head>

<body>

<div class="page-wrapper">

    <div class="background" style="background-image: url('{% static "images/demos/demo-24/slider/back-1.jpg" %}');">

        <header class="header">

            <div class="header-top">
                <div class="header-left">
                    <div class="header-dropdown">
                        <a href="#">Usd</a>
                    </div>

                    <div class="header-dropdown">
                        <a href="#">Eng</a>
                    </div>
                </div>

                <div class="header-right">
                    <ul class="top-menu">
                        <li>
                            <a href="#">Links</a>
                            <ul>
                                <li><a href="tel:+0123456789">Call: +0123 456 789</a></li>
                                <li><a href="#">About Us</a></li>
                                <li><a href="#">Contact Us</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>


            <div class="header-middle sticky-header">

                <div class="header-left">

                    <button class="mobile-menu-toggler">
                        <i class="icon-bars"></i>
                    </button>

                    <!-- HOME LINK -->
                    <a href="/" class="logo">
                        <img src="{% static 'images/demos/demo-24/logo.png' %}" width="110">
                    </a>

                </div>


                <div class="header-center">

                    <nav class="main-nav">
                        <ul class="menu sf-arrows">

                            <li class="active">
                                <a href="/">Home</a>
                            </li>

                        </ul>
                    </nav>

                </div>

            </div>

        </header>


        <div class="slider">

            <div class="intro">
                <h3>Premium Outdoor Gear & Clothing</h3>

                <h4><i>Our New Collections</i></h4>

                <h5>Ski & Snowboard</h5>

                <div class="action">
                    <a href="#">discover now</a>
                </div>
            </div>

            <img src="{% static 'images/demos/demo-24/slider/back-2.png' %}">

        </div>

    </div>



    <footer class="footer">

        <div class="footer-middle">

            <div class="container">

                <img src="{% static 'images/demos/demo-24/logo.png' %}" width="110">

            </div>

        </div>

        <div class="footer-bottom">

            <div class="container">

                <img src="{% static 'images/payments.png' %}" width="272">

            </div>

        </div>

    </footer>

</div>


<!-- JS -->

<script src="{% static 'js/jquery.min.js' %}"></script>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'js/owl.carousel.min.js' %}"></script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
